# This pipeline CI/CD runs every time we push to main or open a pull request.
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/demo-devops-python

jobs:
  # Step 1: Check code quality and run tests
  test:
    name: Lint, Test & Coverage
    runs-on: ubuntu-latest

    env:
      DJANGO_SECRET_KEY: "test-secret-key-for-ci"
      DATABASE_NAME: "db.sqlite3"
      ALLOWED_HOSTS: "*"
      DEBUG: "True"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Static code analysis — checks for syntax errors and bad practices
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-line-length=120 --statistics

      # Run the tests and measure how much code they cover
      - name: Run tests with coverage
        run: |
          coverage run manage.py test
          coverage report

  # Step 2: Build Docker image, scan for vulnerabilities, and push to Docker Hub
  # Only runs on main branch (not on PR)
  build-and-push:
    name: Docker Build, Scan & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build the image first so we can scan it before pushing
      - name: Build Docker image
        run: docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .

      # Scan the image for known vulnerabilities (CVEs) using Trivy.
      # We only fail the build for critical or high severity issues.
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Push the image with two tags: latest and the commit SHA
      - name: Push Docker image
        run: |
          docker tag ${{ env.DOCKER_IMAGE }}:${{ github.sha }} ${{ env.DOCKER_IMAGE }}:latest
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.DOCKER_IMAGE }}:latest

  # Step 3: Deploy to Kubernetes (EKS)
  # This job connects to the EKS cluster in AWS and applies the K8s manifests.
  # It only runs after the Docker image is pushed successfully.
  # Requires AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY secrets in GitHub.
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Connect to AWS using the credentials stored in GitHub Secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Tell kubectl how to talk to our EKS cluster
      - name: Connect to EKS cluster
        run: aws eks update-kubeconfig --region us-east-1 --name demo-devops-cluster

      # Replace the local image name with the Docker Hub image we just pushed
      - name: Update deployment image
        run: |
          sed -i "s|image: demo-devops-python:latest|image: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}|g" k8s/deployment.yaml

      # Apply all the K8s manifests to the cluster
      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml

      # Wait for the pods to be ready and show their status
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/demo-devops-deployment -n demo-devops --timeout=120s
          kubectl get pods -n demo-devops

# A Secret works like a ConfigMap, but for sensitive data (passwords, keys, tokens).
# The values here are encoded in base64 — this is NOT encryption, just encoding.
# In a real production setup, you would use a tool like Vault or Sealed Secrets for proper encryption.
#
# How to encode a value:
#   echo -n 'your-secret-value' | base64
#
# How to decode it back:
#   echo 'ZGphbmdvLWluc2VjdXJlLXRlc3Q...' | base64 --decode
apiVersion: v1
kind: Secret
metadata:
  name: demo-devops-secret
  namespace: demo-devops
type: Opaque
data:
  # Django's secret key — used for cryptographic signing (sessions, tokens, etc.)
  # This value decodes to: "django-insecure-test-key-change-in-production"
  # IMPORTANT: Replace this with a strong random key before going to production
  DJANGO_SECRET_KEY: ZGphbmdvLWluc2VjdXJlLXRlc3Qta2V5LWNoYW5nZS1pbi1wcm9kdWN0aW9u

# HPA stands for Horizontal Pod Autoscaler.
# It keeps an eye on how hard our pods are working (CPU usage)
# and automatically adds or removes pods to match the demand.
#
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-devops-hpa
  namespace: demo-devops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-devops-deployment

  # Always keep at least 2 pods — if one crashes, the other is still there
  minReplicas: 2

  # Don't go above 5 pods — we don't want to use too many resources
  maxReplicas: 5

  # The rule: scale up when average CPU across all pods goes above 70%
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

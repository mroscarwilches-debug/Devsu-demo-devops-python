# HPA = Horizontal Pod Autoscaler.
# It watches how much CPU our pods are using and automatically creates or removes pods.
# This way, the app handles traffic spikes without manual intervention.
#
# How it works:
#   - We always have at least 2 pods running (high availability).
#   - If average CPU usage goes above 70%, Kubernetes adds more pods (up to 5).
#   - When the load drops, it scales back down to 2.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-devops-hpa
  namespace: demo-devops
spec:
  # Which Deployment this autoscaler controls
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-devops-deployment

  # Minimum number of pods — never go below 2 so the app is always available
  minReplicas: 2

  # Maximum number of pods — cap at 5 to avoid using too many resources
  maxReplicas: 5

  # Scale based on CPU usage
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          # When the average CPU across all pods exceeds 70%, create a new pod
          type: Utilization
          averageUtilization: 70
